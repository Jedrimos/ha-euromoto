# EURO MOTO / IDM Dashboard
#
# INSTALLATION:
#   Einstellungen → Dashboards → "+ Dashboard hinzufügen"
#   → Titel: "IDM / EURO MOTO"  → Erstellen
#   → Drei-Punkte-Menü → "Dashboard bearbeiten" → Drei-Punkte oben rechts
#   → "Raw Konfigurationseditor" → diesen Inhalt einfügen → Speichern
#
# Oder in configuration.yaml:
#   lovelace:
#     dashboards:
#       euromoto-dashboard:
#         mode: yaml
#         filename: /config/euromoto-dashboard.yaml
#         title: IDM / EURO MOTO
#         icon: mdi:racing-helmet
#         show_in_sidebar: true

title: IDM / EURO MOTO
views:

  # ============================================================
  # ÜBERSICHT
  # ============================================================
  - title: Übersicht
    icon: mdi:racing-helmet
    path: euromoto-overview
    cards:

      # Rennwochenende-Banner (nur wenn aktiv)
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.euromoto_race_weekend
            state: active
        card:
          type: markdown
          content: >
            ## 🏁 RENNWOCHENENDE AKTIV!
            ### {{ state_attr('sensor.euromoto_race_weekend', 'event_name') }} {{ state_attr('sensor.euromoto_race_weekend', 'country_flag') }}
            **{{ state_attr('sensor.euromoto_race_weekend', 'day') }}**

            [▶ Live-Timing]({{ state_attr('sensor.euromoto_race_weekend', 'livetiming_url') }})
            &nbsp;&nbsp;|&nbsp;&nbsp;
            [📺 Livestream]({{ state_attr('sensor.euromoto_race_weekend', 'livestream_url') }})

      # Streckenwetter (nur wenn verfügbar)
      - type: conditional
        conditions:
          - condition: state
            entity: weather.euromoto_track_weather
            state_not: unavailable
        card:
          type: weather-forecast
          entity: weather.euromoto_track_weather
          show_forecast: false

      # Nächstes Event
      - type: markdown
        content: >
          {% set e = 'sensor.euromoto_next_event' %}
          {% set name = states(e) %}
          {% set flag = state_attr(e, 'country_flag') or '' %}
          {% set days = state_attr(e, 'days_until') | int(-1) %}
          ## {{ flag }} Nächstes Event – {{ name if name not in ['unknown', 'unavailable', 'None', ''] else '–' }}

          {% if days == 0 %}🟢 **Läuft jetzt!**
          {% elif days == 1 %}⏳ **Morgen geht's los!**
          {% elif days > 0 %}⏳ In **{{ days }} Tagen**
          {% else %}*(Kein Event – Saison endet oder noch nicht begonnen)*{% endif %}
          &nbsp;·&nbsp;
          📅 {{ state_attr(e, 'date_start') or '–' }} – {{ state_attr(e, 'date_end') or '–' }}

          | | |
          |---|---|
          | 📏 Länge | **{{ state_attr(e, 'track_length_km') or '–' }} km** |
          | ↩️ Rechtskurven | {{ state_attr(e, 'track_corners_right') or '–' }} |
          | ↪️ Linkskurven | {{ state_attr(e, 'track_corners_left') or '–' }} |
          | ➡️ Längste Gerade | {{ state_attr(e, 'track_longest_straight_m') or '–' }} m |
          | 📍 Adresse | {{ state_attr(e, 'track_address') or '–' }} |

          [🎫 Tickets]({{ state_attr(e, 'tickets_url') }})
          &nbsp;&nbsp;|&nbsp;&nbsp;
          [📺 Livestream]({{ state_attr(e, 'livestream_url') }})
          &nbsp;&nbsp;|&nbsp;&nbsp;
          [⏱️ Live-Timing]({{ state_attr(e, 'livetiming_url') }})

      # Saisonkalender
      - type: markdown
        content: >
          {% set season = state_attr('sensor.euromoto_season_calendar', 'season') or '' %}
          ## 📅 Saisonkalender {{ season }}

          {% set events = state_attr('sensor.euromoto_season_calendar', 'events') or [] %}
          {% set done = state_attr('sensor.euromoto_season_calendar', 'completed_events') or 0 %}
          {% set total = state_attr('sensor.euromoto_season_calendar', 'total_events') or 0 %}
          **{{ done }}/{{ total }}** Runden abgeschlossen

          | Rd | | Datum | Strecke |
          |:---:|:---:|---|---|
          {% for ev in events %}
          {% if ev.status == 'completed' %}{% set ic = '✅' %}{% elif ev.status == 'live' %}{% set ic = '🟢' %}{% else %}{% set ic = '⬜' %}{% endif %}
          | **{{ ev.round }}** | {{ ic }} | {{ ev.date_start }} | {{ ev.country_flag }} {{ ev.name }} |
          {% endfor %}
          {% if not events %}
          *Kalender wird geladen...*
          {% endif %}

  # ============================================================
  # MEISTERSCHAFT + ALLE FAHRER
  # ============================================================
  - title: Meisterschaft
    icon: mdi:trophy
    path: euromoto-standings
    cards:

      # Superbike
      - type: markdown
        content: >
          ## 🏆 IDM Superbike
          {% set st = state_attr('sensor.euromoto_sbk_standings', 'standings') or [] %}
          {% if st %}
          | Pos | # | Fahrer | Nation | Bike | Punkte |
          |:---:|:---:|---|:---:|---|---:|
          {% for r in st %}
          | **{{ r.pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | **{{ r.points }}** |
          {% endfor %}
          {% else %}
          *Noch keine Standings – werden nach dem 1. Rennwochenende veröffentlicht.*
          {% endif %}

      # Supersport
      - type: markdown
        content: >
          ## 🏆 IDM Supersport
          {% set st = state_attr('sensor.euromoto_ssp_standings', 'standings') or [] %}
          {% if st %}
          | Pos | # | Fahrer | Nation | Bike | Punkte |
          |:---:|:---:|---|:---:|---|---:|
          {% for r in st %}
          | **{{ r.pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | **{{ r.points }}** |
          {% endfor %}
          {% else %}
          *Noch keine Standings verfügbar.*
          {% endif %}

  # ============================================================
  # ALLE FAHRER & BIKES
  # ============================================================
  - title: Fahrer & Bikes
    icon: mdi:account-group
    path: euromoto-riders
    cards:

      # Superbike – alle Fahrer mit Bike
      - type: markdown
        content: >
          ## 🏍️ Superbike – Alle Fahrer & Motorräder
          {% set riders = state_attr('sensor.euromoto_sbk_riders', 'riders') or [] %}
          {% set bikes = state_attr('sensor.euromoto_sbk_riders', 'bikes_overview') or {} %}
          **{{ riders | length }} Fahrer**
          {% if bikes %}
          · {% for brand, count in bikes.items() %}{{ brand }}: {{ count }}{% if not loop.last %}, {% endif %}{% endfor %}
          {% endif %}

          | # | Fahrer | Nation | Motorrad |
          |:---:|---|:---:|---|
          {% if riders %}
          {% for r in riders %}
          | **{{ r.number }}** | {{ r.name }} | {{ r.flag }} | {{ r.bike }} |
          {% endfor %}
          {% else %}
          *Keine Daten – Standings werden nach dem 1. Rennen veröffentlicht.*
          {% endif %}

      # Supersport – alle Fahrer mit Bike
      - type: markdown
        content: >
          ## 🏍️ Supersport – Alle Fahrer & Motorräder
          {% set riders = state_attr('sensor.euromoto_ssp_riders', 'riders') or [] %}
          {% set bikes = state_attr('sensor.euromoto_ssp_riders', 'bikes_overview') or {} %}
          **{{ riders | length }} Fahrer**
          {% if bikes %}
          · {% for brand, count in bikes.items() %}{{ brand }}: {{ count }}{% if not loop.last %}, {% endif %}{% endfor %}
          {% endif %}

          | # | Fahrer | Nation | Motorrad |
          |:---:|---|:---:|---|
          {% if riders %}
          {% for r in riders %}
          | **{{ r.number }}** | {{ r.name }} | {{ r.flag }} | {{ r.bike }} |
          {% endfor %}
          {% else %}
          *Keine Daten verfügbar.*
          {% endif %}

  # ============================================================
  # STARTAUFSTELLUNG
  # ============================================================
  - title: Startaufstellung
    icon: mdi:flag-checkered
    path: euromoto-grid
    cards:

      - type: markdown
        content: >
          ## 🏁 Superbike – Startaufstellung / Qualifying
          {% set grid = state_attr('sensor.euromoto_sbk_grid', 'grid') or [] %}
          {% if grid %}
          **Pole:** {{ grid[0].flag }} **{{ grid[0].name }}** ({{ grid[0].bike }}) – {{ grid[0].best_time }}

          | P | # | Fahrer | Nation | Motorrad | Beste Zeit |
          |:---:|:---:|---|:---:|---|---|
          {% for r in grid %}
          | **{{ r.grid_pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | `{{ r.best_time }}` |
          {% endfor %}
          {% else %}
          *Keine Startaufstellung verfügbar.*
          Die Startaufstellung wird nach der Superpole/Qualifikation veröffentlicht (PDF auf results.bike-promotion.com).
          {% endif %}

      - type: markdown
        content: >
          ## 🏁 Supersport – Startaufstellung / Qualifying
          {% set grid = state_attr('sensor.euromoto_ssp_grid', 'grid') or [] %}
          {% if grid %}
          **Pole:** {{ grid[0].flag }} **{{ grid[0].name }}** ({{ grid[0].bike }}) – {{ grid[0].best_time }}

          | P | # | Fahrer | Nation | Motorrad | Beste Zeit |
          |:---:|:---:|---|:---:|---|---|
          {% for r in grid %}
          | **{{ r.grid_pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | `{{ r.best_time }}` |
          {% endfor %}
          {% else %}
          *Keine Startaufstellung verfügbar.*
          {% endif %}

  # ============================================================
  # MEINE FAHRER (Favoriten)
  # ============================================================
  - title: Meine Fahrer
    icon: mdi:account-heart
    path: euromoto-favorites
    cards:

      - type: markdown
        content: >
          ## 🏍️ Meine Favoriten
          Startnummern in **Einstellungen → Integrationen → EURO MOTO → Konfigurieren** eintragen.
          Beispiel: `94, 52, 77`

      # Favorit #94 – ersetze 94 durch deine Startnummer(n)
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.euromoto_favorite_rider_94
            state_not: unavailable
        card:
          type: markdown
          content: >
            {% set s = 'sensor.euromoto_favorite_rider_94' %}
            ## {{ state_attr(s, 'flag') }} {{ states(s) }} — #{{ state_attr(s, 'number') }}

            | | |
            |---|---|
            | 🏆 Meisterschaft | **P{{ state_attr(s, 'position') }}** |
            | 🏍️ Motorrad | {{ state_attr(s, 'bike') }} |
            | 🌍 Nation | {{ state_attr(s, 'flag') }} {{ state_attr(s, 'nation') }} |
            | 🏅 Punkte | **{{ state_attr(s, 'points') }}** |
            | 📂 Klasse | {{ state_attr(s, 'class') }} |

      # Top 10 als entities (schnell überblicken)
      - type: entities
        title: Superbike Top 10
        entities:
          - entity: sensor.euromoto_sbk_p1
            name: "🥇 P1"
          - entity: sensor.euromoto_sbk_p2
            name: "🥈 P2"
          - entity: sensor.euromoto_sbk_p3
            name: "🥉 P3"
          - entity: sensor.euromoto_sbk_p4
            name: "   P4"
          - entity: sensor.euromoto_sbk_p5
            name: "   P5"
          - entity: sensor.euromoto_sbk_p6
            name: "   P6"
          - entity: sensor.euromoto_sbk_p7
            name: "   P7"
          - entity: sensor.euromoto_sbk_p8
            name: "   P8"
          - entity: sensor.euromoto_sbk_p9
            name: "   P9"
          - entity: sensor.euromoto_sbk_p10
            name: "   P10"
