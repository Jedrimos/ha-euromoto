# EURO MOTO / IDM Dashboard
#
# INSTALLATION:
#   Einstellungen → Dashboards → "+ Dashboard hinzufügen"
#   → Titel: "IDM / EURO MOTO"  → Erstellen
#   → Drei-Punkte-Menü → "Dashboard bearbeiten" → Drei-Punkte oben rechts
#   → "Raw Konfigurationseditor" → diesen Inhalt einfügen → Speichern
#
# Oder in configuration.yaml:
#   lovelace:
#     dashboards:
#       euromoto-dashboard:
#         mode: yaml
#         filename: /config/euromoto-dashboard.yaml
#         title: IDM / EURO MOTO
#         icon: mdi:racing-helmet
#         show_in_sidebar: true

title: IDM / EURO MOTO
views:

  # ============================================================
  # ÜBERSICHT
  # ============================================================
  - title: Übersicht
    icon: mdi:racing-helmet
    path: euromoto-overview
    cards:

      # Status-Banner (kein Sensor nötig – alles aus sensor.euromoto_race_weekend)
      - type: markdown
        content: >
          {% set rw = states('sensor.euromoto_race_weekend') %}
          {% set ev = state_attr('sensor.euromoto_race_weekend', 'event_name') or '' %}
          {% set flag = state_attr('sensor.euromoto_race_weekend', 'country_flag') or '' %}
          {% set day = state_attr('sensor.euromoto_race_weekend', 'day') or '' %}
          {% set cd = states('sensor.euromoto_session_countdown') %}
          {% if rw == 'active' %}
          ## 🟢 RENNWOCHENENDE: {{ flag }} {{ ev }}
          **{{ day }}**
          {% if cd not in ('unknown', 'unavailable', 'none', '') %}
          ⏳ Nächste Session in **{{ cd }} Min.**
          {% endif %}

          [▶ Live-Timing]({{ state_attr('sensor.euromoto_race_weekend', 'livetiming_url') or 'http://livetiming.bike-promotion.com/#/channel/c1' }})
          &nbsp;&nbsp;|&nbsp;&nbsp;
          [📺 Livestream]({{ state_attr('sensor.euromoto_race_weekend', 'livestream_url') or 'https://euromoto.racing/live/' }})
          {% else %}
          ## ⚫ Kein aktives Rennwochenende
          {% set cd = states('sensor.euromoto_session_countdown') %}
          {% if cd not in ('unknown', 'unavailable', 'none', '') %}
          ⏳ Nächste Session in **{{ cd }} Min.**
          {% endif %}
          {% endif %}

      # Streckenwetter (nur wenn verfügbar)
      - type: conditional
        conditions:
          - condition: state
            entity: weather.euromoto_track_weather
            state_not: unavailable
        card:
          type: weather-forecast
          entity: weather.euromoto_track_weather
          show_forecast: false

      # Nächstes Event
      - type: markdown
        content: >
          {% set e = 'sensor.euromoto_next_event' %}
          {% set name = states(e) %}
          {% set flag = state_attr(e, 'country_flag') or '' %}
          {% set days = state_attr(e, 'days_until') | int(-1) %}
          ## {{ flag }} Nächstes Event – {{ name if name not in ['unknown', 'unavailable', 'None', ''] else '–' }}

          {% if days == 0 %}🟢 **Läuft jetzt!**
          {% elif days == 1 %}⏳ **Morgen geht's los!**
          {% elif days > 0 %}⏳ In **{{ days }} Tagen**
          {% else %}*(Kein Event – Saison endet oder noch nicht begonnen)*{% endif %}
          &nbsp;·&nbsp;
          📅 {{ state_attr(e, 'date_start') or '–' }} – {{ state_attr(e, 'date_end') or '–' }}

          | | |
          |---|---|
          | 📏 Länge | **{{ state_attr(e, 'track_length_km') or '–' }} km** |
          | ↩️ Rechtskurven | {{ state_attr(e, 'track_corners_right') or '–' }} |
          | ↪️ Linkskurven | {{ state_attr(e, 'track_corners_left') or '–' }} |
          | ➡️ Längste Gerade | {{ state_attr(e, 'track_longest_straight_m') or '–' }} m |
          | 📍 Adresse | {{ state_attr(e, 'track_address') or '–' }} |

          [🎫 Tickets]({{ state_attr(e, 'tickets_url') or 'https://tickets.euromoto.racing/' }})
          &nbsp;&nbsp;|&nbsp;&nbsp;
          [📺 Livestream]({{ state_attr(e, 'livestream_url') or 'https://euromoto.racing/live/' }})
          &nbsp;&nbsp;|&nbsp;&nbsp;
          [⏱️ Live-Timing]({{ state_attr(e, 'livetiming_url') or 'http://livetiming.bike-promotion.com/#/channel/c1' }})

      # Saisonkalender
      - type: markdown
        content: >
          {% set season = state_attr('sensor.euromoto_season_calendar', 'season') or '' %}
          ## 📅 Saisonkalender {{ season }}

          {% set events = state_attr('sensor.euromoto_season_calendar', 'events') or [] %}
          {% set done = state_attr('sensor.euromoto_season_calendar', 'completed_events') or 0 %}
          {% set total = state_attr('sensor.euromoto_season_calendar', 'total_events') or 0 %}
          **{{ done }}/{{ total }}** Runden abgeschlossen

          | Rd | | Datum | Strecke |
          |:---:|:---:|---|---|
          {% for ev in events %}
          {% if ev.status == 'completed' %}{% set ic = '✅' %}{% elif ev.status == 'live' %}{% set ic = '🟢' %}{% else %}{% set ic = '⬜' %}{% endif %}
          | **{{ ev.round }}** | {{ ic }} | {{ ev.date_start }} | {{ ev.country_flag }} {{ ev.name }} |
          {% endfor %}
          {% if not events %}
          *Kalender wird geladen...*
          {% endif %}

  # ============================================================
  # LIVE-TIMING
  # ============================================================
  - title: Live-Timing
    icon: mdi:timer-outline
    path: euromoto-live
    cards:

      # Session-Status aus sensor.euromoto_race_weekend (kein binary_sensor nötig)
      - type: markdown
        content: >
          {% set rw = states('sensor.euromoto_race_weekend') %}
          {% set nxt = state_attr('sensor.euromoto_weekend_schedule', 'next_session') %}
          {% set cd = states('sensor.euromoto_session_countdown') %}
          {% if rw == 'active' %}
          ## 🟢 Rennwochenende aktiv!
          {% if nxt %}
          {% set icons = {'FP1':'🔵','FP2':'🔵','FP3':'🔵','Training':'🔵','PreP':'🟡','Qualifying':'🟡','Superpole':'🟡','Warm-up':'🟠','Race 1':'🏁','Race 2':'🏁'} %}
          ### {{ icons.get(nxt.session, '📋') }} Nächste Session: {{ nxt.session }} – {{ nxt.cls }}
          🕐 **{{ nxt.time_start }}** Uhr {% if nxt.time_end %}bis {{ nxt.time_end }} Uhr{% endif %}
          {% if cd not in ('unknown', 'unavailable', 'none', '') %}
          ⏳ Noch **{{ cd }} Minuten**
          {% endif %}
          {% endif %}
          {% else %}
          ## ⚫ Kein Rennwochenende aktiv
          *Nächstes Event: {{ states('sensor.euromoto_next_event') or '–' }}*
          {% endif %}

      # Live-Timing Link
      - type: markdown
        content: >
          ## ⏱️ Live-Timing

          [▶ Live-Timing im Browser öffnen](http://livetiming.bike-promotion.com/#/channel/c1)

          *Das Live-Timing läuft nur während aktiver Sessions.
          Öffne den Link oben – iFrame wird von HA-Sicherheitsrichtlinien blockiert.*

  # ============================================================
  # MEISTERSCHAFT + ALLE FAHRER
  # ============================================================
  - title: Meisterschaft
    icon: mdi:trophy
    path: euromoto-standings
    cards:

      # Superbike
      - type: markdown
        content: >
          ## 🏆 IDM Superbike
          {% set st = state_attr('sensor.euromoto_sbk_standings', 'standings') or [] %}
          {% if st %}
          | Pos | # | Fahrer | Nation | Bike | Punkte |
          |:---:|:---:|---|:---:|---|---:|
          {% for r in st %}
          | **{{ r.pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | **{{ r.points }}** |
          {% endfor %}
          {% else %}
          *Noch keine Standings – werden nach dem 1. Rennwochenende veröffentlicht.*
          {% endif %}

      # Supersport
      - type: markdown
        content: >
          ## 🏆 IDM Supersport
          {% set st = state_attr('sensor.euromoto_ssp_standings', 'standings') or [] %}
          {% if st %}
          | Pos | # | Fahrer | Nation | Bike | Punkte |
          |:---:|:---:|---|:---:|---|---:|
          {% for r in st %}
          | **{{ r.pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | **{{ r.points }}** |
          {% endfor %}
          {% else %}
          *Noch keine Standings verfügbar.*
          {% endif %}

  # ============================================================
  # ALLE FAHRER & BIKES
  # ============================================================
  - title: Fahrer & Bikes
    icon: mdi:account-group
    path: euromoto-riders
    cards:

      # Superbike – alle Fahrer mit Bike
      - type: markdown
        content: >
          ## 🏍️ Superbike – Alle Fahrer & Motorräder
          {% set riders = state_attr('sensor.euromoto_sbk_riders', 'riders') or [] %}
          {% set bikes = state_attr('sensor.euromoto_sbk_riders', 'bikes_overview') or {} %}
          **{{ riders | length }} Fahrer**
          {% if bikes %}
          · {% for brand, count in bikes.items() %}{{ brand }}: {{ count }}{% if not loop.last %}, {% endif %}{% endfor %}
          {% endif %}

          | # | Fahrer | Nation | Motorrad |
          |:---:|---|:---:|---|
          {% if riders %}
          {% for r in riders %}
          | **{{ r.number }}** | {{ r.name }} | {{ r.flag }} | {{ r.bike }} |
          {% endfor %}
          {% else %}
          *Keine Daten – Standings werden nach dem 1. Rennen veröffentlicht.*
          {% endif %}

      # Supersport – alle Fahrer mit Bike
      - type: markdown
        content: >
          ## 🏍️ Supersport – Alle Fahrer & Motorräder
          {% set riders = state_attr('sensor.euromoto_ssp_riders', 'riders') or [] %}
          {% set bikes = state_attr('sensor.euromoto_ssp_riders', 'bikes_overview') or {} %}
          **{{ riders | length }} Fahrer**
          {% if bikes %}
          · {% for brand, count in bikes.items() %}{{ brand }}: {{ count }}{% if not loop.last %}, {% endif %}{% endfor %}
          {% endif %}

          | # | Fahrer | Nation | Motorrad |
          |:---:|---|:---:|---|
          {% if riders %}
          {% for r in riders %}
          | **{{ r.number }}** | {{ r.name }} | {{ r.flag }} | {{ r.bike }} |
          {% endfor %}
          {% else %}
          *Keine Daten verfügbar.*
          {% endif %}

  # ============================================================
  # STARTAUFSTELLUNG
  # ============================================================
  - title: Startaufstellung
    icon: mdi:flag-checkered
    path: euromoto-grid
    cards:

      - type: markdown
        content: >
          ## 🏁 Superbike – Startaufstellung / Qualifying
          {% set grid = state_attr('sensor.euromoto_sbk_grid', 'grid') or [] %}
          {% if grid %}
          **Pole:** {{ grid[0].flag }} **{{ grid[0].name }}** ({{ grid[0].bike }}) – {{ grid[0].best_time }}

          | P | # | Fahrer | Nation | Motorrad | Beste Zeit |
          |:---:|:---:|---|:---:|---|---|
          {% for r in grid %}
          | **{{ r.grid_pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | `{{ r.best_time }}` |
          {% endfor %}
          {% else %}
          *Keine Startaufstellung verfügbar.*
          Die Startaufstellung wird nach der Superpole/Qualifikation veröffentlicht.
          {% endif %}

      - type: markdown
        content: >
          ## 🏁 Supersport – Startaufstellung / Qualifying
          {% set grid = state_attr('sensor.euromoto_ssp_grid', 'grid') or [] %}
          {% if grid %}
          **Pole:** {{ grid[0].flag }} **{{ grid[0].name }}** ({{ grid[0].bike }}) – {{ grid[0].best_time }}

          | P | # | Fahrer | Nation | Motorrad | Beste Zeit |
          |:---:|:---:|---|:---:|---|---|
          {% for r in grid %}
          | **{{ r.grid_pos }}** | {{ r.number }} | {{ r.name }} | {{ r.flag }} | {{ r.bike }} | `{{ r.best_time }}` |
          {% endfor %}
          {% else %}
          *Keine Startaufstellung verfügbar.*
          {% endif %}

  # ============================================================
  # TAGESPLAN
  # ============================================================
  - title: Tagesplan
    icon: mdi:calendar-clock
    path: euromoto-schedule
    cards:

      # Nächste Session
      - type: markdown
        content: >
          ## ⏱️ Nächste Session
          {% set s = state_attr('sensor.euromoto_weekend_schedule', 'next_session') %}
          {% if s %}
          {% set icon = {'FP1':'🔵','FP2':'🔵','FP3':'🔵','Training':'🔵','PreP':'🟡','Qualifying':'🟡','Superpole':'🟡','Warm-up':'🟠','Race 1':'🏁','Race 2':'🏁'} %}
          ### {{ icon.get(s.session, '📋') }} {{ s.session }} – {{ s.cls }}
          🕐 **{{ s.time_start }}** Uhr {% if s.time_end %}bis {{ s.time_end }} Uhr{% endif %}
          {% set cd = states('sensor.euromoto_session_countdown') %}
          {% if cd not in ('unknown', 'unavailable', 'none', '') %}
          ⏳ Noch **{{ cd }} Minuten**
          {% endif %}
          {% else %}
          *Kein weiteres Event dieses Wochenende*
          {% endif %}

      # Freitag
      - type: markdown
        content: >
          ## 🔵 Freitag – Training
          {% set sessions = state_attr('sensor.euromoto_weekend_schedule', 'friday') or [] %}
          {% if sessions %}
          | Uhrzeit | Session | Klasse |
          |:---:|---|---|
          {% for s in sessions %}
          | **{{ s.time }}** | {{ s.icon }} {{ s.session }} | {{ s.class }} |
          {% endfor %}
          {% else %}
          *Kein Freitag-Programm verfügbar*
          {% endif %}

      # Samstag
      - type: markdown
        content: >
          ## 🟡 Samstag – Training & Qualifying & Rennen
          {% set sessions = state_attr('sensor.euromoto_weekend_schedule', 'saturday') or [] %}
          {% if sessions %}
          | Uhrzeit | Session | Klasse |
          |:---:|---|---|
          {% for s in sessions %}
          | **{{ s.time }}** | {{ s.icon }} {{ s.session }} | {{ s.class }} |
          {% endfor %}
          {% else %}
          *Kein Samstag-Programm verfügbar*
          {% endif %}

      # Sonntag
      - type: markdown
        content: >
          ## 🏁 Sonntag – Superpole & Rennen
          {% set sessions = state_attr('sensor.euromoto_weekend_schedule', 'sunday') or [] %}
          {% if sessions %}
          | Uhrzeit | Session | Klasse |
          |:---:|---|---|
          {% for s in sessions %}
          | **{{ s.time }}** | {{ s.icon }} {{ s.session }} | {{ s.class }} |
          {% endfor %}
          {% else %}
          *Kein Sonntag-Programm verfügbar*
          {% endif %}

  # ============================================================
  # MEINE FAHRER (Favoriten)
  # ============================================================
  - title: Meine Fahrer
    icon: mdi:account-heart
    path: euromoto-favorites
    cards:

      - type: markdown
        content: >
          ## 🏍️ Meine Favoriten
          Startnummern in **Einstellungen → Integrationen → EURO MOTO → Konfigurieren** eintragen.
          Beispiel: `94, 52, 77`

      # Favorit #94 – ersetze 94 durch deine Startnummer(n)
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.euromoto_favorite_rider_94
            state_not: unavailable
        card:
          type: markdown
          content: >
            {% set s = 'sensor.euromoto_favorite_rider_94' %}
            ## {{ state_attr(s, 'flag') }} {{ states(s) }} — #{{ state_attr(s, 'number') }}

            | | |
            |---|---|
            | 🏆 Meisterschaft | **P{{ state_attr(s, 'position') }}** |
            | 🏍️ Motorrad | {{ state_attr(s, 'bike') }} |
            | 🌍 Nation | {{ state_attr(s, 'flag') }} {{ state_attr(s, 'nation') }} |
            | 🏅 Punkte | **{{ state_attr(s, 'points') }}** |
            | 📂 Klasse | {{ state_attr(s, 'class') }} |

      # Top 10 aus Standings (kein Fehler wenn Daten fehlen)
      - type: markdown
        content: >
          ## 🏆 Superbike Top 10
          {% set st = state_attr('sensor.euromoto_sbk_standings', 'standings') or [] %}
          {% if st %}
          | Pos | # | Fahrer | Nation | Punkte |
          |:---:|:---:|---|:---:|---:|
          {% for r in st[:10] %}
          | **{{ r.pos }}** | {{ r.number }} | {{ r.flag }} {{ r.name }} | {{ r.flag }} | **{{ r.points }}** |
          {% endfor %}
          {% else %}
          *Keine Daten – Standings werden nach dem 1. Rennen veröffentlicht.*
          {% endif %}

  # ============================================================
  # INFO
  # ============================================================
  - title: Info
    icon: mdi:information
    path: euromoto-info
    cards:

      - type: markdown
        content: >
          ## ℹ️ EURO MOTO / IDM Integration

          **Daten werden automatisch aktualisiert:**
          - Normal: alle 6 Stunden
          - Rennwochenende: alle 30 Minuten

          **Datenquellen:**
          - Kalender: euromoto.racing/termine-strecken/
          - Ergebnisse: results.bike-promotion.com (PDF)
          - Wetter: Open-Meteo (kostenlos, kein API-Key)
          - Live-Timing: livetiming.bike-promotion.com

          **Meine Fahrer konfigurieren:**
          Einstellungen → Integrationen → EURO MOTO → Konfigurieren
          → Startnummern eintragen (z.B. `94, 52, 77`)

          **Integration neu laden:**
          Einstellungen → Integrationen → EURO MOTO → Drei-Punkte → Neu laden
